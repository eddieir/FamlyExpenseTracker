# Netlify configuration

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://unpkg.com https://fonts.googleapis.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com 'unsafe-inline'; font-src https://fonts.gstatic.com data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://unpkg.com; img-src 'self' data:;"

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
